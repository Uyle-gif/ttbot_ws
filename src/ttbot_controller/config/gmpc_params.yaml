gmpc_controller:
  ros__parameters:
    # 1. Vehicle / controller params
    desired_speed: 1.5        # tốc độ xe muốn chạy
                               # tăng -> xe chạy nhanh hơn, bám đường khó hơn
                               # giảm -> xe chậm hơn, dễ ổn định hơn

    wheel_base: 0.65          # chiều dài cơ sở của xe
                               # tăng -> xe quay đầu chậm hơn, cua rộng hơn
                               # giảm -> xe quay nhanh hơn, nhạy hơn

    max_steer_deg: 30.0       # góc lái tối đa cho phép
                               # tăng -> xe ôm cua gắt hơn, nhưng dễ rung
                               # giảm -> xe mượt hơn, nhưng cua gắt kém hơn

    goal_tolerance: 0.3       # gần đích bao nhiêu thì coi như đã tới
                               # tăng -> dừng sớm hơn, đỡ lắc ở cuối
                               # giảm -> chính xác hơn, nhưng dễ lắc gần đích

    # 2. GMPC horizon / sampling
    N_p: 10                   # xe nhìn trước bao nhiêu bước
                               # tăng -> nhìn xa hơn, đi mượt hơn
                               # nhưng tính toán nặng hơn
                               # giảm -> phản ứng nhanh hơn, nhưng nhìn ngắn

    dt_mpc: 0.1               # thời gian của mỗi bước dự đoán
                               # tăng -> tính nhẹ hơn, nhưng điều khiển thô hơn
                               # giảm -> điều khiển mịn hơn, nhưng nặng hơn

    # 3. GMPC weights
    Q_ex: 10.0                # phạt xe đi lệch theo hướng dọc đường
                               # tăng -> xe cố bám đúng tiến độ hơn
                               # giảm -> bớt ép theo tiến độ hơn

    Q_ey: 20.0                # phạt xe lệch ngang khỏi đường
                               # tăng -> xe ép sát vào đường hơn
                               # nhưng quá cao thì dễ lắc trái phải
                               # giảm -> xe mềm hơn, nhưng dễ lệch đường hơn

    Q_epsi: 10.0              # phạt đầu xe bị lệch hướng so với đường
                               # tăng -> đầu xe quay đúng hướng nhanh hơn
                               # nhưng dễ đánh lái gắt hơn
                               # giảm -> xe đỡ gắt hơn, nhưng dễ bị xéo đầu xe

    R_v: 1.0                  # phạt việc ra lệnh tốc độ lớn
                               # tăng -> xe ít thay đổi tốc độ, chạy êm hơn
                               # giảm -> xe sửa lỗi nhanh hơn, nhưng dễ giật

    R_omega: 0.5              # phạt việc ra lệnh quay lớn
                               # tăng -> xe quay nhẹ hơn, mượt hơn
                               # giảm -> xe quay mạnh hơn, ôm cua tốt hơn
                               # nhưng dễ bị lắc hơn

    R_dv: 20.0                # phạt đổi tốc độ đột ngột
                               # tăng -> đỡ giật ga, đỡ giật phanh
                               # giảm -> phản ứng nhanh hơn, nhưng dễ giật

    R_domega: 4.0             # phạt đổi lái/quay đột ngột
                               # tăng -> giảm rung lái, giảm zig-zag
                               # giảm -> quay đầu nhanh hơn, nhưng dễ lắc